<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VoiceTrace Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #eef2ff 0%, #f8fafc 55%);
        font-family:
          Inter,
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
        color: #0f172a;
      }
      .card {
        max-width: 460px;
        margin: 24px;
        padding: 28px;
        border-radius: 18px;
        border: 1px solid #e2e8f0;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>
        VoiceTrace cannot reach the internet right now. Reconnect to sync
        WhatsApp and voice logs, then refresh this page.
      </p>
    </main>
  </body>
</html>
